<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STABLE DUTY 🐴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  button, .btn { touch-action: manipulation; cursor: pointer; }

  :root {
    --green: #5a8a3c;
    --dark-green: #3a5a28;
    --brown: #8b5c2a;
    --light-brown: #c4883e;
    --cream: #f5e6c8;
    --dirt: #b8864e;
    --sky: #7ec8e3;
    --dark: #1a1a2e;
    --yellow: #f7d060;
    --red: #e05c5c;
    --poop: #6b3f1f;
    --poop-light: #8b5e3c;
  }

  body {
    background: var(--dark);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  #gameContainer {
    width: 390px;
    height: 700px;
    position: relative;
    overflow: hidden;
    background: var(--sky);
    border: 4px solid var(--dark);
    box-shadow: 0 0 0 4px var(--yellow), 0 0 0 8px var(--dark), 12px 12px 0 #000;
  }

  /* Sky scanlines */
  #gameContainer::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Ground */
  #ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 200px;
    background: linear-gradient(to bottom, #6aaa3c 0%, #5a8a3c 15%, #4a7a2c 35%, #3a5a28 55%, var(--dirt) 70%, var(--brown) 100%);
    z-index: 1;
  }

  /* Fence */
  .fence {
    position: absolute;
    bottom: 195px;
    width: 100%;
    height: 20px;
    background: repeating-linear-gradient(
      to right,
      var(--cream) 0px,
      var(--cream) 18px,
      var(--brown) 18px,
      var(--brown) 22px
    );
    z-index: 2;
  }
  .fence-top {
    position: absolute;
    bottom: 208px;
    width: 100%;
    height: 6px;
    background: var(--cream);
    z-index: 2;
  }
  .fence-mid {
    position: absolute;
    bottom: 198px;
    width: 100%;
    height: 6px;
    background: var(--cream);
    z-index: 2;
  }

  /* Score overlay */
  #scoreOverlay {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 50;
    pointer-events: none;
    line-height: 1.8;
  }
  #score {
    font-family: 'Press Start 2P', monospace;
    font-size: 33px;
    color: #fff;
    text-shadow: 2px 2px 0 #000;
    display: block;
  }
  #level {
    font-family: 'Press Start 2P', monospace;
    font-size: 27px;
    color: var(--yellow);
    text-shadow: 2px 2px 0 #000;
    display: block;
  }

  /* Wheelbarrow */
  #wheelbarrow {
    position: absolute;
    left: 20px;
    width: 80px;
    height: 70px;
    cursor: grab;
    z-index: 4;
    transition: filter 0.2s;
    user-select: none;
  }

  #wheelbarrow.full {
    filter: drop-shadow(0 0 8px var(--red));
    animation: wobble 0.5s infinite;
  }

  @keyframes wobble {
    0%,100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  #wheelbarrow.dragging { cursor: grabbing; opacity: 0.9; }

  #wbCount {
    position: absolute;
    left: 22px;
    color: var(--yellow);
    font-size: 6px;
    z-index: 4;
    text-shadow: 1px 1px 0 #000;
    background: var(--dark);
    padding: 2px 4px;
    border: 1px solid var(--yellow);
  }

  /* Horses */
  .horse {
    position: absolute;
    width: 90px;
    height: 70px;
    z-index: 5;
    user-select: none;
    pointer-events: none;
  }

  /* Poop */
  .poop {
    position: absolute;
    width: 36px;
    height: 28px;
    cursor: grab;
    z-index: 8;
    user-select: none;
    transition: transform 0.1s;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5));
  }
  .poop:active { cursor: grabbing; transform: scale(1.2); }
  .poop.dragging { z-index: 30; transform: scale(1.15); }

  /* Screens */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 40px;
    z-index: 60;
    background: rgba(10,10,20,0.92);
    gap: 20px;
    padding: 40px 8px 20px;
  }

  .screen h1 {
    color: var(--yellow);
    font-size: 35px;
    text-align: center;
    text-shadow: 4px 4px 0 var(--brown);
    line-height: 1.6;
  }
  .screen h2 {
    color: var(--cream);
    font-size: 18px;
    text-align: center;
    line-height: 2;
    color: #aaa;
  }
  .screen p {
    color: var(--cream);
    font-size: 13px;
    text-align: center;
    line-height: 2.2;
  }

  .btn {
    background: var(--yellow);
    color: var(--dark);
    border: none;
    padding: 12px 24px;
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    cursor: pointer;
    border-bottom: 4px solid var(--brown);
    border-right: 4px solid var(--brown);
    transition: all 0.1s;
    text-transform: uppercase;
  }
  .btn:active {
    border-bottom: 1px solid var(--brown);
    border-right: 1px solid var(--brown);
    transform: translate(3px, 3px);
  }

  /* Cloud */
  .cloud {
    position: absolute;
    z-index: 0;
    pointer-events: none;
  }

  /* Party horse dance animation */
  @keyframes dance {
    0%   { transform: scaleX(-1) rotate(-8deg) translateY(0px); }
    25%  { transform: scaleX(-1) rotate(8deg) translateY(-6px); }
    50%  { transform: scaleX(-1) rotate(-8deg) translateY(0px); }
    75%  { transform: scaleX(-1) rotate(8deg) translateY(-6px); }
    100% { transform: scaleX(-1) rotate(-8deg) translateY(0px); }
  }
  .horse.party {
    animation: dance 0.5s infinite;
    filter: drop-shadow(0 0 6px rgba(255,100,255,0.8));
  }

  /* Goth horse stomp animation */
  @keyframes stomp {
    0%   { transform: scaleX(-1) translateY(0px); }
    20%  { transform: scaleX(-1) translateY(-4px) rotate(-3deg); }
    40%  { transform: scaleX(-1) translateY(0px) rotate(0deg); }
    60%  { transform: scaleX(-1) translateY(-3px) rotate(2deg); }
    80%  { transform: scaleX(-1) translateY(0px) rotate(0deg); }
    100% { transform: scaleX(-1) translateY(0px); }
  }
  .horse.goth {
    animation: stomp 0.7s infinite;
    filter: drop-shadow(0 0 8px rgba(180,0,0,0.9));
  }

  /* Message pop */
  .msg-pop {
    position: absolute;
    font-family: 'Press Start 2P', monospace;
    font-size: 33px;
    color: var(--yellow);
    text-shadow: 2px 2px 0 #000;
    z-index: 40;
    pointer-events: none;
    animation: popUp 1.2s ease-out forwards;
  }
  @keyframes popUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.7); }
  }

  #fullMsg {
    position: absolute;
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    color: var(--red);
    z-index: 20;
    text-align: left;
    animation: blink 0.6s infinite;
    display: none;
    line-height: 1.4;
    text-shadow: 2px 2px 0 #000;
    white-space: nowrap;
  }
  #arrowAnim {
    color: var(--yellow);
    display: inline-block;
    animation: slideRight 0.6s infinite;
  }
  @keyframes slideRight {
    0%   { transform: translateX(0); }
    50%  { transform: translateX(10px); }
    100% { transform: translateX(0); }
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Poop-o-meter */
  #meter {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 15;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  #meterLabel { font-size: 5px; color: var(--cream); text-shadow: 1px 1px 0 #000; }
  #meterBar {
    width: 14px;
    height: 70px;
    border: 2px solid var(--cream);
    background: var(--dark);
    position: relative;
    overflow: hidden;
  }
  #meterFill {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: var(--poop);
    transition: height 0.3s;
  }
</style>
</head>

<script>
const container = document.getElementById('gameContainer');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const wb = document.getElementById('wheelbarrow');
const wbCount = document.getElementById('wbCount');
const fullMsg = document.getElementById('fullMsg');
const meterFill = document.getElementById('meterFill');
const wbPoopsEl = document.getElementById('wbPoops');

const WB_CAPACITY = 5;
const BONUS_FULL = 100;
const PTS_POOP = 10;

let score = 0;
let level = 1;
let wbPile = 0;
let gameSpeed = 2.0;
let wbFull = false;
let wbPos = { x: 20, y: 415 };
let poops = [];
let horses = [];
let gameRunning = false;
let dragItem = null;
let dragOffset = { x: 0, y: 0 };
let wbDragging = false;
let wbDragOffset = { x: 0, y: 0 };
let timers = [];
let maxPoopsOnField = 8;

function getRect(el) {
  const r = el.getBoundingClientRect();
  const cr = container.getBoundingClientRect();
  return {
    x: r.left - cr.left,
    y: r.top - cr.top,
    w: r.width,
    h: r.height
  };
}

// ---- Score ----
function addScore(pts, x, y) {
  score += pts;
  scoreEl.textContent = 'SCORE: ' + score;
  popup('+' + pts, x, y);
  updateLevel();
}

function popup(txt, x, y) {
  const el = document.createElement('div');
  el.className = 'msg-pop';
  el.textContent = txt;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  container.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function updateLevel() {
  levelEl.textContent = 'LVL ' + level;
}

// ---- Wheelbarrow ----
function positionWB() {
  wb.style.left = wbPos.x + 'px';
  wb.style.top = wbPos.y + 'px';
  wbCount.style.left = (wbPos.x + 2) + 'px';
  wbCount.style.top = (wbPos.y - 18) + 'px';
  fullMsg.style.left = (wbPos.x) + 'px';
  fullMsg.style.top = (wbPos.y - 70) + 'px';
}

function updateWBDisplay() {
  wbCount.textContent = wbPile + '/' + WB_CAPACITY;
  meterFill.style.height = (wbPile / WB_CAPACITY * 100) + '%';
  // Draw mini poops inside tray
  wbPoopsEl.innerHTML = '';
  for (let i = 0; i < wbPile; i++) {
    const cx = 18 + (i % 3) * 18;
    const cy = 30 + Math.floor(i / 3) * 10;
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', 5);
    c.setAttribute('fill', '#6b3f1f'); c.setAttribute('stroke','#3a1f0a'); c.setAttribute('stroke-width','1');
    wbPoopsEl.appendChild(c);
  }
  if (wbPile >= WB_CAPACITY) {
    wb.classList.add('full');
    fullMsg.style.display = 'block';
    wbFull = true;
  } else {
    wb.classList.remove('full');
    fullMsg.style.display = 'none';
    wbFull = false;
  }
}

const HORSE_SVGS = [
  { body: '#c4883e', mane: '#8b5c2a' },
  { body: '#888', mane: '#444' },
  { body: '#4a2f0f', mane: '#2a1a00' },
  { body: '#f0d080', mane: '#c4883e' },
];

function createHorse() {
  if (!gameRunning) return;
  const maxHorses = Math.min(level, 4);
  const currentHorses = horses.length;
  if (currentHorses >= maxHorses) return;

  const rng = Math.random();
  const isParty = level > 1 && rng < 0.12;
  const isGoth = level > 1 && !isParty && rng < 0.17; // 5% of total (0.12-0.17)
  const fromRight = true;
  const el = document.createElement('div');
  el.className = isParty ? 'horse party' : isGoth ? 'horse goth' : 'horse';
  const startX = 400;
  const y = 420 + Math.random() * 40;
  el.style.left = startX + 'px';
  el.style.top = y + 'px';
  if (!isParty && !isGoth) el.style.transform = 'scaleX(-1)';

  if (isParty) {
    el.innerHTML = partyHorseSVG();
  } else if (isGoth) {
    el.innerHTML = gothHorseSVG();
  } else {
    const colors = HORSE_SVGS[Math.floor(Math.random() * HORSE_SVGS.length)];
    el.innerHTML = horsesSVG(colors.body, colors.mane);
  }
  container.appendChild(el);

  const horse = { el, x: startX, y, fromRight, pooped: false, poopCount: 0, isParty, isGoth, speed: (0.5 + Math.random() * 0.5) * gameSpeed };
  horses.push(horse);
  gameSpeed *= 1.03;

  // Animation loop for this horse
  horse.interval = setInterval(() => {
    if (!gameRunning) { clearInterval(horse.interval); return; }
    horse.x += fromRight ? -horse.speed : horse.speed;
    horse.el.style.left = horse.x + 'px';

    // Poop only when tail is far enough left that poop stays fully on screen
    const maxDrops = 1 + level; // starts at 2, +1 per level
    if (!horse.pooped && horse.poopCount < maxDrops && horse.x > 60 && horse.x < 294) {
      if (Math.random() < 0.04) {
        horse.pooped = true;
        horse.poopCount++;
        dropPoop(horse.x + 78, horse.y + 55, horse.isParty, horse.isGoth);
        setTimeout(() => {
          horse.pooped = false;
        }, 1500 + Math.random() * 1500);
      }
    }

    // Exit screen
    if ((fromRight && horse.x < -110) || (!fromRight && horse.x > 410)) {
      clearInterval(horse.interval);
      horse.el.remove();
      horses = horses.filter(h => h !== horse);
    }
  }, 30);

  timers.push(horse.interval);
}

function dropPoop(x, y, isRainbow = false, isSkull = false) {
  if (poops.length >= 5) return;
  const el = document.createElement('div');
  el.className = 'poop';
  el.style.left = (x - 18) + 'px';
  el.style.top = (y - 14) + 'px';
  if (isSkull) {
    el.innerHTML = skullPoopSVG();
    el.style.filter = 'drop-shadow(0 0 6px rgba(180,0,0,0.9))';
  } else if (isRainbow) {
    el.innerHTML = rainbowPoopSVG();
    el.style.filter = 'drop-shadow(0 0 5px rgba(255,100,255,0.9))';
  } else {
    el.innerHTML = poopSVG();
  }
  container.appendChild(el);
  // Drop animation
  el.style.transform = 'scale(0)';
  setTimeout(() => { el.style.transform = 'scale(1)'; el.style.transition = 'transform 0.2s'; }, 10);

  const pts = isSkull ? 150 : isRainbow ? 250 : PTS_POOP;
  const poop = { el, x: x - 18, y: y - 14, id: Date.now() + Math.random(), points: pts };
  poops.push(poop);

  // Check game over condition
  if (poops.length >= 5) {
    setTimeout(triggerGameOver, 300);
  }

  // Make draggable
  el.addEventListener('mousedown', e => startDragPoop(e, poop));
  el.addEventListener('touchstart', e => startDragPoop(e, poop), { passive: false });
}

// ---- Drag Poop ----
function startDragPoop(e, poop) {
  if (wbFull) return; // can't pick up if WB full and not emptied? Actually allow pickup but not drop
  e.preventDefault();
  dragItem = poop;
  poop.el.classList.add('dragging');
  const pos = getClientPos(e);
  const cr = container.getBoundingClientRect();
  dragOffset.x = pos.x - cr.left - poop.x;
  dragOffset.y = pos.y - cr.top - poop.y;
}

function getClientPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

document.addEventListener('mousemove', onMoveGlobal);
document.addEventListener('touchmove', onMoveGlobal, { passive: false });
document.addEventListener('mouseup', onEndGlobal);
document.addEventListener('touchend', onEndGlobal);

function onMoveGlobal(e) {
  if (!gameRunning) return;
  const pos = getClientPos(e);
  const cr = container.getBoundingClientRect();
  const cx = pos.x - cr.left;
  const cy = pos.y - cr.top;

  if (dragItem) {
    e.preventDefault();
    dragItem.x = cx - dragOffset.x;
    dragItem.y = cy - dragOffset.y;
    dragItem.el.style.left = dragItem.x + 'px';
    dragItem.el.style.top = dragItem.y + 'px';
  }
  if (wbDragging) {
    e.preventDefault();
    wbPos.x = cx - wbDragOffset.x;
    wbPos.y = cy - wbDragOffset.y;
    positionWB();
  }
}

function onEndGlobal(e) {
  if (dragItem) {
    const poop = dragItem;
    poop.el.classList.remove('dragging');
    dragItem = null;

    // Check drop on wheelbarrow
    const wbR = getRect(wb);
    const px = poop.x + 18, py = poop.y + 14;
    if (px > wbR.x && px < wbR.x + wbR.w && py > wbR.y && py < wbR.y + wbR.h) {
      if (!wbFull) {
        // Drop into WB
        poop.el.remove();
        poops = poops.filter(p => p !== poop);
        wbPile++;
        updateWBDisplay();
        addScore(poop.points, wbPos.x + 40, wbPos.y);
      } else {
        // Bounce back - WB full
        popup('FULL!', wbPos.x + 20, wbPos.y - 20);
      }
    }
  }

  if (wbDragging) {
    wb.classList.remove('dragging');
    wbDragging = false;
    // Check if dragged off the RIGHT edge only
    if (wbFull && wbPos.x > 290) {
      emptyWB();
    } else if (wbFull) {
      // Snap back
      wbPos = { x: 20, y: 415 };
      positionWB();
    }
  }
}

// ---- WB Drag ----
wb.addEventListener('mousedown', startDragWB);
wb.addEventListener('touchstart', startDragWB, { passive: false });

function startDragWB(e) {
  if (!gameRunning) return;
  e.preventDefault();
  e.stopPropagation();
  wbDragging = true;
  wb.classList.add('dragging');
  const pos = getClientPos(e);
  const cr = container.getBoundingClientRect();
  wbDragOffset.x = pos.x - cr.left - wbPos.x;
  wbDragOffset.y = pos.y - cr.top - wbPos.y;
}

function emptyWB() {
  const wasFullBonus = wbPile >= WB_CAPACITY;
  gameSpeed *= 1.05;
  level++;
  levelEl.textContent = 'LVL ' + level;
  if (wasFullBonus) {
    addScore(BONUS_FULL, 120, 320);
    popup('BONUS!', 120, 320);
    setTimeout(() => popup('LVL ' + level + '!', 120, 320), 700);
  } else {
    popup('LVL ' + level + '!', 120, 320);
  }
  wbPile = 0;
  wbFull = false;
  wbPos = { x: 20, y: 415 };
  positionWB();
  updateWBDisplay();
}

// ---- Game loop ----
function triggerGameOver() {
  if (!gameRunning) return;
  gameRunning = false;
  horses.forEach(h => clearInterval(h.interval));
  timers.forEach(clearInterval);
  timers = [];
  const go = document.getElementById('gameOverScreen');
  document.getElementById('finalScore').textContent = 'SCORE: ' + score;
  go.style.display = 'flex';
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameOverScreen').style.display = 'none';
  // Reset
  score = 0; level = 1; wbPile = 0; wbFull = false; gameSpeed = 2.0;
  poops.forEach(p => p.el.remove()); poops = [];
  horses.forEach(h => { clearInterval(h.interval); h.el.remove(); }); horses = [];
  timers.forEach(clearInterval); timers = [];
  scoreEl.textContent = 'SCORE: 0';
  levelEl.textContent = 'LVL 1';
  updateWBDisplay();
  wbPos = { x: 20, y: 415 };
  positionWB();
  gameRunning = true;

  // Spawn horses
  spawnLoop();
  // Clouds
  spawnClouds();
}

function spawnLoop() {
  if (!gameRunning) return;
  createHorse();
  const delay = Math.max(600, (4000 - level * 200) / gameSpeed);
  const t = setTimeout(spawnLoop, delay);
  timers.push(t);
}

// ---- Clouds ----
function spawnClouds() {
  for (let i = 0; i < 3; i++) {
    createCloud(Math.random() * 300 + 50, Math.random() * 80 + 45);
  }
}

function createCloud(x, y) {
  const el = document.createElement('div');
  el.className = 'cloud';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  const w = 60 + Math.random() * 60;
  el.innerHTML = `<svg viewBox="0 0 ${w} 30" width="${w}" height="30" opacity="0.85">
    <ellipse cx="${w/2}" cy="20" rx="${w/2-5}" ry="10" fill="white"/>
    <ellipse cx="${w/2-10}" cy="14" rx="${w/4}" ry="10" fill="white"/>
    <ellipse cx="${w/2+8}" cy="12" rx="${w/4-2}" ry="11" fill="white"/>
  </svg>`;
  container.appendChild(el);
  const speed = 0.2 + Math.random() * 0.3;
  const ci = setInterval(() => {
    x += speed;
    if (x > 420) x = -100;
    el.style.left = x + 'px';
  }, 50);
  timers.push(ci);
}

// init position
positionWB();
updateWBDisplay();

// set initial WB position to left
wbPos = { x: 20, y: 415 };
positionWB();

// Wire up buttons safely (works on GitHub Pages)
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('startBtn').addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });
document.getElementById('retryBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });
</script>
